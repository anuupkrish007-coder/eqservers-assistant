<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EQServers Reply Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 680px; }
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
  .logo { width: 44px; height: 44px; background: #015AFF; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
  .header-text h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
  .header-text p { font-size: 13px; color: #64748b; margin-top: 2px; }
  .card { background: #131929; border: 1px solid #1e293b; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
  label { display: block; font-size: 12px; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  textarea, input[type="text"], input[type="password"], select { width: 100%; background: #0d1422; border: 1px solid #1e293b; border-radius: 10px; color: #e2e8f0; font-size: 14px; font-family: inherit; padding: 12px 14px; outline: none; transition: border-color 0.2s; resize: vertical; }
  textarea:focus, input:focus, select:focus { border-color: #015AFF; }
  textarea { line-height: 1.6; }
  select { cursor: pointer; resize: none; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
  .api-hint { font-size: 12px; color: #475569; margin-top: 6px; line-height: 1.5; }
  .btn-primary { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 1rem; background: #015AFF; color: #fff; border: none; border-radius: 10px; padding: 13px 20px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #0047cc; }
  .btn-primary:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
  .spinner { width: 18px; height: 18px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .reply-card { display: none; background: #0d1422; border: 1px solid #015AFF44; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; }
  .reply-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .reply-label { font-size: 12px; font-weight: 500; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.6px; }
  .btn-copy { display: flex; align-items: center; gap: 6px; background: #015AFF22; color: #60a5fa; border: 1px solid #015AFF44; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .reply-text { font-size: 14px; line-height: 1.75; color: #cbd5e1; white-space: pre-wrap; }
  .action-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-sm { background: transparent; color: #64748b; border: 1px solid #1e293b; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-sm:hover { background: #1e293b; color: #94a3b8; }
  .error-box { display: none; background: #2d0f0f; border: 1px solid #7f1d1d; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #fca5a5; margin-top: 1rem; line-height: 1.6; white-space: pre-wrap; }
  .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip { background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  .chip:hover { background: #015AFF22; color: #60a5fa; border-color: #015AFF44; }
  .divider { height: 1px; background: #1e293b; margin: 1.5rem 0; }
  .footer { text-align: center; font-size: 12px; color: #334155; margin-top: 1.5rem; }
  .status { font-size: 12px; color: #60a5fa; margin-top: 8px; min-height: 18px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🖥️</div>
    <div class="header-text">
      <h1>EQServers Reply Assistant</h1>
      <p>AI-powered chat replies for your support workflow</p>
    </div>
  </div>

  <div class="card">
    <label>🔑 API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
    <p class="api-hint">Paste the key shared by your team lead. It stays only on your device.</p>
  </div>

  <div class="card">
    <label>Customer message</label>
    <textarea id="customerMsg" rows="5" placeholder="Paste the customer's chat message here…&#10;&#10;e.g. Hi, do you have servers in Europe? What are the prices?"></textarea>
    <div class="quick-chips">
      <span class="chip" onclick="fillChip('Do you have servers in the Netherlands?')">NL servers</span>
      <span class="chip" onclick="fillChip('What are your dedicated server prices?')">Pricing</span>
      <span class="chip" onclick="fillChip('Do you offer unmetered bandwidth?')">Bandwidth</span>
      <span class="chip" onclick="fillChip('Is there a free setup fee?')">Setup fee</span>
      <span class="chip" onclick="fillChip('Do you have servers for game hosting?')">Gaming</span>
      <span class="chip" onclick="fillChip('Can I get a server for video streaming?')">Streaming</span>
      <span class="chip" onclick="fillChip('What is your uptime guarantee?')">Uptime SLA</span>
      <span class="chip" onclick="fillChip('Do you have any discounts or promo codes?')">Discounts</span>
    </div>
    <div class="divider"></div>
    <div class="row">
      <div>
        <label>Your name (optional)</label>
        <input type="text" id="agentName" placeholder="e.g. Ravi" />
      </div>
      <div>
        <label>Tone</label>
        <select id="tone">
          <option value="friendly">Friendly & professional</option>
          <option value="formal">Formal & corporate</option>
          <option value="brief">Brief & direct</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" id="generateBtn" onclick="generateReply()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">✨ Generate reply</span>
    </button>
    <div class="status" id="status"></div>
    <div class="error-box" id="errorBox"></div>
    <div class="reply-card" id="replyCard">
      <div class="reply-header">
        <span class="reply-label">✅ Ready to send</span>
        <button class="btn-copy" onclick="copyReply()" id="copyBtn">📋 Copy</button>
      </div>
      <div class="reply-text" id="replyText"></div>
      <div class="action-row">
        <button class="btn-sm" onclick="generateReply()">🔄 Regenerate</button>
        <button class="btn-sm" onclick="clearAll()">🗑 Clear</button>
      </div>
    </div>
  </div>
  <div class="footer">EQServers.com · For internal support use only</div>
</div>

<script>
const SYSTEM_PROMPT = `You are a helpful, professional sales and support agent for EQServers (eqservers.com), a dedicated bare metal server hosting company.

ABOUT EQSERVERS:
- Bare metal dedicated servers only (no VPS or shared hosting)
- Locations: Netherlands (Haarlem), USA (Manassas, VA), Germany, Canada (Montreal)
- Network: 10Gbps and 25Gbps ports, unmetered or high-bandwidth options
- Uptime: 99.9% SLA, 24/7/365 support
- Free setup on all servers
- New customer coupon: FIRSTTIME (5% off first order)

EXAMPLE SERVERS:
- NL-101: Intel Xeon E3-1230v2, 32GB RAM, 2x 2TB SATA, 10TB bandwidth, 1Gbps — $29/mo
- NL-109: Intel Xeon E-2286G, 32GB RAM, 1x 960GB NVMe + 4x 8TB SATA, 100TB bandwidth, 10Gbps — $159/mo
- CA-709: 2x AMD EPYC 7402, 256GB RAM, 2x 1TB SSD + 10x 24TB SATA, 200TB bandwidth, 10Gbps — $495/mo

USE CASES: Gaming, video streaming & CDN, AI/ML, SaaS, e-commerce, high-bandwidth apps, storage, VoIP/VPN.

Write ONLY the reply message — no notes or explanation before or after.`;

function fillChip(text) {
  document.getElementById('customerMsg').value = text;
  document.getElementById('customerMsg').focus();
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function generateReply() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const msg = document.getElementById('customerMsg').value.trim();
  const name = document.getElementById('agentName').value.trim();
  const tone = document.getElementById('tone').value;

  if (!apiKey) { showError('Please enter the API key above.'); return; }
  if (!msg) { showError('Please paste a customer message first.'); return; }

  hideError();
  document.getElementById('replyCard').style.display = 'none';
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('btnText').textContent = 'Generating…';

  const toneMap = {
    friendly: 'Be friendly, warm, and professional.',
    formal: 'Be formal and corporate.',
    brief: 'Be very brief. 2-3 sentences max.'
  };

  const sig = name ? `\n\nBest regards,\n${name}\nEQServers Support Team` : '\n\nBest regards,\nEQServers Support Team';
  const userPrompt = `Customer message: "${msg}"\n\nTone: ${toneMap[tone]}\n\nEnd with:${sig}`;

  const payload = {
    model: 'claude-sonnet-4-5',
    max_tokens: 1000,
    system: SYSTEM_PROMPT,
    messages: [{ role: 'user', content: userPrompt }]
  };

  try {
    setStatus('Connecting…');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content.map(b => b.text || '').join('').trim();
    document.getElementById('replyText').textContent = reply;
    document.getElementById('replyCard').style.display = 'block';
    setStatus('');
  } catch(e) {
    setStatus('');
    showError('❌ Error: ' + e.message);
  }

  document.getElementById('generateBtn').disabled = false;
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btnText').textContent = '✨ Generate reply';
}

function copyReply() {
  const text = document.getElementById('replyText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
  });
}

function clearAll() {
  document.getElementById('customerMsg').value = '';
  document.getElementById('replyCard').style.display = 'none';
  hideError();
  setStatus('');
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}

function hideError() { document.getElementById('errorBox').style.display = 'none'; }

document.getElementById('customerMsg').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) generateReply();
});
</script>
</body>
</html>
